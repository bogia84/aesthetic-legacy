<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Legacy</title>
    <!-- Include Manrope Font -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Include Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <style>
        /* --- GLOBAL VARIABLES & RESET --- */
        :root {
            --primary-red: #EC262D; 
            --light-grey: #f4f4f4;
            --text-dark: #111;
            --bg-dark: #282828;
            --text-light: #fff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* --- PAGE LOADER --- */
        #page-loader {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }
        #page-loader.hidden { opacity: 0; pointer-events: none; }
        .loader-spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary-red);
            border-radius: 50%;
            animation: loader-spin 0.75s linear infinite;
        }
        @keyframes loader-spin { to { transform: rotate(360deg); } }
        
        body { 
            font-family: 'Manrope', sans-serif; 
            color: var(--text-dark); 
            overflow-x: hidden; 
            background: var(--bg-dark); 
            position: relative;
        }

        /* --- HEADER --- */
        header {
            position: absolute; 
            top: 40px;
            left: 10%;
            width: 80%; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000; 
            background: #fff; 
            padding: 15px 30px; 
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .logo { font-weight: 900; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; text-transform: uppercase;}
        
        nav { display: flex; font-size: 0.9rem; font-weight: 600; text-transform: uppercase; }
        nav a { text-decoration: none; color: var(--text-dark); margin-left: 20px; transition: color 0.3s ease;}
        nav a:hover { color: var(--primary-red); }
        nav a.active { color: var(--primary-red); } 
        
        .hamburger { display: none; cursor: pointer; color: var(--text-dark); padding: 5px;}

        /* --- SECTION 1: DETAIL HERO --- */
        .detail-hero {
            position: relative;
            width: 100%;
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            background-color: #000;
        }

        .hero-bg-image {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: center;
            z-index: 1;
        }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.25); 
            z-index: 2;
        }

        .hero-title {
            position: relative;
            z-index: 3;
            color: #fff;
            font-size: clamp(60px, 12vw, 160px); 
            font-weight: 700;
            line-height: 1.05;
            letter-spacing: -0.02em;
            text-shadow: 0px 10px 30px rgba(0, 0, 0, 0.4);
            margin-top: 60px; 
        }

        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            color: #fff;
            animation: bounceArrow 2s infinite ease-in-out;
            opacity: 0.8;
        }
        .scroll-indicator svg { width: 24px; height: 50px; }

        @keyframes bounceArrow {
            0%, 100% { transform: translate(-50%, 0); }
            50% { transform: translate(-50%, 12px); }
        }

        /* --- SECTION 2: DETAIL CONTENT BLOCK --- */
        .detail-content-section {
            background-color: #F9F8F8; 
            padding: 100px 10%;
            display: flex;
            justify-content: center;
        }

        .detail-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            max-width: 1100px; 
            width: 100%;
            align-items: stretch;
        }

        .detail-image-wrapper {
            width: 100%;
            aspect-ratio: 4 / 5; 
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }

        .detail-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .detail-info-card {
            background: #ffffff;
            padding: 50px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04); 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .detail-info-card h3 {
            font-size: 1rem;
            font-weight: 700;
            color: #111;
            margin-bottom: 10px;
        }

        .detail-info-card h2 {
            font-size: clamp(32px, 3.5vw, 44px);
            font-weight: 800;
            color: #111;
            margin-bottom: 30px;
            line-height: 1.1;
            letter-spacing: -0.02em;
        }

        .detail-stats-list {
            list-style: none;
            margin-bottom: 30px;
            width: 100%;
        }

        .detail-stats-list li {
            padding: 16px 0;
            border-bottom: 1px solid #E8E8E8;
            color: #333;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .detail-stats-list li:first-child { border-top: 1px solid #E8E8E8; }

        .detail-bio {
            color: #555;
            line-height: 1.7;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* --- SECTION 3: CONTRIBUTOR ARTICLES (SLIDER) --- */
        .contributor-articles-section {
            background-color: #282828;
            padding: 100px 10%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .articles-heading {
            color: #ffffff;
            font-size: clamp(24px, 2.5vw, 32px);
            font-weight: 700;
            text-align: center;
            margin-bottom: 40px;
        }

        .articles-slider-container {
            width: 100%;
            max-width: 1100px;
            position: relative;
        }

        .article-swiper {
            width: 100%;
            overflow: hidden;
        }

        .article-card {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 5;
            overflow: hidden;
            background-color: #1a1a1a;
            border-radius: 2px;
        }

        .article-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .article-card:hover img {
            transform: scale(1.05);
        }

        .article-overlay {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            padding: 20px 25px; 
            background: rgba(40, 40, 40, 0.6); 
            color: #fff;
            pointer-events: none;
        }

        .article-title {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .article-date {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 500;
        }

        .slider-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 40px;
        }

        .nav-arrow {
            width: 44px;
            height: 44px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-arrow:hover {
            border-color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-arrow svg {
            width: 20px;
            height: 20px;
        }

        /* --- SECTION 4: SOCIAL GALLERY --- */
        .social-gallery-section {
            background-color: #F9F8F8;
            padding: 100px 10%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .social-heading {
            color: #111;
            font-size: clamp(24px, 2.5vw, 32px);
            font-weight: 700;
            text-align: center;
            margin-bottom: 50px;
        }

        .social-gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 40px;
        }

        .gallery-col {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .gallery-img {
            width: 100%;
            object-fit: cover;
            display: block;
        }

        .gallery-img.tall { aspect-ratio: 4 / 5; }
        .gallery-img.square { aspect-ratio: 1 / 1; }

        .social-footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .social-footer span {
            font-size: 1rem;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
        }

        .social-links-colored {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .social-links-colored a {
            display: inline-flex;
            transition: transform 0.3s ease;
        }

        .social-links-colored a:hover {
            transform: scale(1.15);
        }

        .social-links-colored svg {
            width: 26px;
            height: 26px;
        }

        /* --- SECTION 5: NEWSPAPER --- */
        .newspaper-section {
            background-color: #282828;
            padding: 100px 10%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .newspaper-heading {
            color: #ffffff;
            font-size: clamp(24px, 2.5vw, 32px);
            font-weight: 700;
            text-align: center;
            margin-bottom: 50px;
        }

        .newspaper-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .news-card {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 5; /* Updated ratio */
            background-color: #1a1a1a;
            overflow: hidden;
            border-radius: 2px;
        }

        .news-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .news-card:hover img {
            transform: scale(1.05);
        }

        .news-overlay {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            padding: 20px;
            background: rgba(40, 40, 40, 0.65);
            color: #fff;
            pointer-events: none;
        }

        .news-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .news-date {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 500;
        }

        /* --- SECTION 6: FOOTER --- */
        .block-footer { background: #fff; align-items: center; text-align: center; padding: 60px 10%; }
        .footer-logo-container svg { width: 100%; height: auto; max-width: 416px; display: block; margin: 0 auto 30px; }
        
        .socials-wrapper { display: flex; align-items: center; justify-content: center; gap: 20px; }
        .follow-text { font-size: 1.1rem; font-weight: 500; color: #111; }
        .social-icons { display: flex; gap: 15px; align-items: center; }
        .social-icons svg { width: 24px; height: 24px; cursor: pointer; color: #111; transition: color 0.3s ease; }
        .social-icons svg:hover { color: var(--primary-red); }

        /* --- RESPONSIVE MOBILE FIXES --- */
        @media (max-width: 992px) {
            .detail-container { grid-template-columns: 1fr; max-width: 600px; gap: 30px; }
            .social-gallery { grid-template-columns: repeat(2, 1fr); }
            .newspaper-grid { grid-template-columns: repeat(2, 1fr); max-width: 800px;}
        }

        @media (max-width: 768px) {
            header { 
                position: relative; width: 100%; left: 0; flex-direction: row; 
                justify-content: space-between; top: 0; margin-bottom: 20px; 
                padding: 15px 5%; border-radius: 0; box-shadow: none;
            }
            .logo span { display: none; } 
            .hamburger { display: flex; align-items: center; z-index: 101; position: relative;}
            
            nav { 
                position: absolute; top: 60px; right: 5%; width: 90%;
                background: #ffffff; flex-direction: column; align-items: center;
                border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
                max-height: 0; opacity: 0; visibility: hidden; overflow: hidden;
                transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            }
            nav.open { max-height: 300px; opacity: 1; visibility: visible; padding: 20px 0; }
            nav a { margin: 15px 0; font-size: 1.1rem; opacity: 0; transform: translateY(-10px); transition: all 0.3s ease; }
            nav.open a { opacity: 1; transform: translateY(0); }

            .hero-title { margin-top: 0; padding: 0 5%; }
            .scroll-indicator { bottom: 25px; }

            .detail-content-section { padding: 60px 5%; }
            .detail-info-card { padding: 30px 20px; }

            .contributor-articles-section { padding: 60px 5%; }
            .articles-heading { margin-bottom: 25px; }

            .social-gallery-section { padding: 60px 5%; }
            .social-gallery { grid-template-columns: 1fr; gap: 15px; }
            .social-footer { flex-direction: column; gap: 15px; }

            .newspaper-section { padding: 60px 5%; }
            .newspaper-heading { margin-bottom: 25px; }
            
            /* Responsive Newspaper Horizontal Scroll */
            .newspaper-grid { 
                display: flex; 
                flex-wrap: nowrap; 
                overflow-x: auto; 
                gap: 15px; 
                scroll-snap-type: x mandatory;
                scrollbar-width: none; /* Hide scrollbar Firefox */
                -ms-overflow-style: none; /* Hide scrollbar IE/Edge */
            }
            /* Hide scrollbar Chrome/Safari */
            .newspaper-grid::-webkit-scrollbar { 
                display: none; 
            }
            .news-card { 
                flex: 0 0 85%; /* 85% width lets the next card peek into view */
                scroll-snap-align: start; 
            }

            .block-footer { padding: 50px 5%; }
            .footer-logo-container svg { max-width: 80%; margin-bottom: 25px; }
        }
    </style>
</head>

            ];

            // Fetch all data from GitHub upfront
            var ghResults = await Promise.all([
                ghStorage.getContributors(),
                ghStorage.getArticles()
            ]).catch(function() { return [{ contributors: [] }, []]; });
            var contribData = ghResults[0];
            var allArticles = ghResults[1];
            var contributors = (contribData.contributors && contribData.contributors.length) ? contribData.contributors : DEFAULT_CONTRIBUTORS;

            (function populateContributor() {
                var params = new URLSearchParams(window.location.search);
                var idx = parseInt(params.get('index'), 10);
                var c = (!isNaN(idx) && contributors[idx]) ? contributors[idx] : contributors[0];
                var realIdx = !isNaN(idx) ? idx : 0;

                document.title = c.name + ' - Aesthetic Legacy';

                var heroBg = document.getElementById('detail-hero-bg');
                if (heroBg) { heroBg.src = c.bg || c.img; heroBg.alt = c.name + ' Background'; }

                var heroTitle = document.getElementById('detail-hero-title');
                if (heroTitle) {
                    var parts = c.name.trim().split(' ');
                    heroTitle.innerHTML = parts.length > 1
                        ? parts[0] + '<br>' + parts.slice(1).join(' ')
                        : parts[0];
                }

                var mainImg = document.getElementById('detail-main-img');
                if (mainImg) { mainImg.src = c.img; mainImg.alt = c.name + ' Portrait'; }

                var nameEl = document.getElementById('detail-name');
                if (nameEl) nameEl.textContent = c.name;

                var roleEl = document.getElementById('detail-role');
                if (roleEl) roleEl.textContent = c.role;

                var statsList = document.getElementById('detail-stats');
                if (statsList && c.stats) {
                    statsList.innerHTML = c.stats.map(function(s) { return '<li>' + s + '</li>'; }).join('');
                }

                var bioEl = document.getElementById('detail-bio');
                if (bioEl) bioEl.textContent = c.bio || '';

                var articlesHeading = document.getElementById('detail-articles-heading');
                if (articlesHeading) articlesHeading.textContent = c.name + ' - Aesthetic Legacy';

                var socialHeading = document.getElementById('detail-social-heading');
                if (socialHeading) socialHeading.textContent = c.name + ' - Social';

                // Populate social gallery images from contributor data
                if (c.galleryImages && c.galleryImages.length) {
                    c.galleryImages.forEach(function(src, i) {
                        if (!src) return;
                        var el = document.getElementById('social-img-' + (i + 1));
                        if (el) el.src = src;
                    });
                }

                var newspaperHeading = document.getElementById('detail-newspaper-heading');
                if (newspaperHeading) newspaperHeading.textContent = c.name + ' - Newspaper';

                // Render social icons from contributor data

                    var container = document.getElementById('detail-social-icons');
                    if (!container) return;
                    var sl = c.socialLinks || {};
                    var SOCIAL_SVG = {
                        facebook: { color: '#1877F2', path: 'M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047v-2.66c0-3.005 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.267h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z' },
                        youtube: { color: '#FF0000', path: 'M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z' },
                        instagram: { color: 'url(#ig-grad)', path: 'M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm3.98-10.98a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z' },
                        linkedin: { color: '#0A66C2', path: 'M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zM7.119 20.452H3.554V9h3.565v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z' },
                        twitter: { color: '#1DA1F2', path: 'M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z' },

                    var html = '';
                    var hasSocial = false;
                    ['facebook','youtube','instagram','linkedin','twitter','tiktok'].forEach(function(p) {
                        var sd = sl[p] || {};
                        if (!sd.enabled || !sd.url) return;
                        hasSocial = true;
                        var label = p.charAt(0).toUpperCase() + p.slice(1);
                        var svgInfo = SOCIAL_SVG[p];
                        var extraDefs = p === 'instagram' ? igGradDef : '';
                        html += '<a href="' + sd.url.replace(/"/g,'&quot;') + '" target="_blank" rel="noopener" aria-label="' + label + '">' +
                            '<svg viewBox="0 0 24 24" fill="' + svgInfo.color + '" xmlns="http://www.w3.org/2000/svg">' + extraDefs + '<path d="' + svgInfo.path + '"/></svg></a>';
                    });
                    // If no social links configured at all, keep existing hardcoded icons (fallback)
                    if (hasSocial) container.innerHTML = html;
                })();

                // Render newspaper section from contributor data
                (function renderNewspaper() {
                    var grid = document.getElementById('detail-newspaper-grid');
                    if (!grid) return;
                    var newsItems = c.newsItems || [];

                    var validItems = [];
                    newsItems.forEach(function(item) {
                        if (!item) return;
                        if (item.source === 'article') {
                            var art = allArticles.find(function(a) { return String(a.id) === String(item.id); });
                            if (art) {
                                var _artI = allArticles.indexOf(art);
                                validItems.push({
                                    img: art.heroImage || '',
                                    title: art.title || '',
                                    date: art.date || '',
                                    link: 'blog_article.html?index=' + _artI
                                });
                            }
                        } else if (item.source === 'url' && item.url) {
                            validItems.push({
                                img: item.img || '',
                                title: item.title || '',
                                date: item.date || '',
                                link: item.link || item.url || '#'
                            });
                        }
                    });

                    if (validItems.length > 0) {
                        grid.innerHTML = validItems.map(function(v) {
                            return '<a href="' + v.link.replace(/"/g,'&quot;') + '" class="news-card" style="text-decoration:none;display:block;">' +
                                (v.img ? '<img src="' + v.img.replace(/"/g,'&quot;') + '" alt="' + v.title.replace(/"/g,'&quot;') + '">' : '') +
                                '<div class="news-overlay">' +
                                '<h4 class="news-title">' + v.title + '</h4>' +
                                (v.date ? '<span class="news-date">' + v.date + '</span>' : '') +
                                '</div></a>';
                        }).join('');
                    }
                    // If no items configured, keep hardcoded fallback cards
                })();
            })();

            // --- Mobile Menu Toggle ---
            const hamburger = document.getElementById('hamburger-menu');
            const nav = document.getElementById('main-nav');
            if (hamburger && nav) {
                hamburger.addEventListener('click', function() {
                    nav.classList.toggle('open');
                });
            }

            // --- Section 3: Populate Articles from localStorage then init Swiper ---
            (function populateArticleCarousel() {
                var params = new URLSearchParams(window.location.search);
                var idx = parseInt(params.get('index'), 10);
                var articlesSection = document.querySelector('.contributor-articles-section');
                var swiperWrapper = document.querySelector('.article-swiper .swiper-wrapper');
                if (!swiperWrapper || !articlesSection) return;

                var contribArticles = allArticles.filter(function(a) {
                    return !isNaN(idx) && a.contributorIdx === idx;
                }).sort(function(a, b) { return b.createdAt - a.createdAt; });

                if (contribArticles.length === 0) {
                    articlesSection.style.display = 'none';
                    return;
                }

                // Clear hardcoded placeholder slides
                swiperWrapper.innerHTML = '';

                contribArticles.forEach(function(art) {
                    var slide = document.createElement('div');
                    slide.className = 'swiper-slide';

                    var link = document.createElement('a');
                    link.href = 'blog_article.html?index=' + allArticles.indexOf(art);
                    link.style.cssText = 'text-decoration:none;display:block;height:100%;';

                    var card = document.createElement('div');
                    card.className = 'article-card';
                    card.style.cssText = 'position:relative;overflow:hidden;border-radius:4px;height:320px;cursor:pointer;';

                    var img = document.createElement('img');
                    img.src = art.heroImage || '';
                    img.alt = art.title || '';
                    img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.4s ease;';

                    var overlay = document.createElement('div');
                    overlay.style.cssText = 'position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.75) 0%,transparent 55%);display:flex;flex-direction:column;justify-content:flex-end;padding:20px 16px;';

                    var h4 = document.createElement('h4');
                    h4.textContent = art.title || 'Untitled';
                    h4.style.cssText = 'margin:0 0 6px;font-size:0.85rem;font-weight:700;color:#fff;line-height:1.35;letter-spacing:0.02em;';

                    var dateSpan = document.createElement('span');
                    dateSpan.textContent = art.date || '';
                    dateSpan.style.cssText = 'font-size:0.72rem;color:rgba(255,255,255,0.7);font-weight:600;letter-spacing:0.03em;';

                    overlay.appendChild(h4);
                    overlay.appendChild(dateSpan);
                    card.appendChild(img);
                    card.appendChild(overlay);
                    link.appendChild(card);
                    slide.appendChild(link);
                    swiperWrapper.appendChild(slide);
                });
            })();

            } catch(e) {
                // swallow — content already populated via fallback
            } finally {
                showMain();
            }

            const articleSwiperElement = document.querySelector('.article-swiper');
            if (articleSwiperElement) {
                new Swiper('.article-swiper', {
                    slidesPerView: 1,
                    spaceBetween: 20,
                    loop: document.querySelectorAll('.article-swiper .swiper-slide').length > 1,
                    navigation: {
                        nextEl: '.next-article-arrow',
                        prevEl: '.prev-article-arrow',
                    },
                    breakpoints: {
                        768: {
                            slidesPerView: 2,
                            spaceBetween: 30
                        }
                    }
                });
            }
        });
